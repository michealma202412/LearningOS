<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearningOS - 录音页面</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
      padding: 30px;
      max-width: 600px;
      width: 100%;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 28px;
    }

    .folder-info {
      background: #f5f5f5;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      text-align: center;
    }

    .folder-info strong {
      color: #667eea;
      font-size: 16px;
    }

    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 30px;
      flex-wrap: wrap;
    }

    button {
      flex: 1;
      min-width: 120px;
      padding: 12px 20px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    #start {
      background: #4CAF50;
      color: white;
    }

    #start:hover {
      background: #45a049;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(76, 175, 80, 0.3);
    }

    #start:disabled {
      background: #cccccc;
      cursor: not-allowed;
      transform: none;
    }

    #stop {
      background: #f44336;
      color: white;
    }

    #stop:hover {
      background: #da190b;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(244, 67, 54, 0.3);
    }

    #stop:disabled {
      background: #cccccc;
      cursor: not-allowed;
      transform: none;
    }

    .status {
      text-align: center;
      margin-bottom: 20px;
      min-height: 24px;
    }

    .status.recording {
      color: #f44336;
      font-weight: bold;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0.5; }
    }

    .list {
      margin-top: 20px;
      border-top: 2px solid #f0f0f0;
      padding-top: 20px;
    }

    .list h2 {
      font-size: 18px;
      color: #333;
      margin-bottom: 15px;
    }

    .list-item {
      background: #f9f9f9;
      padding: 12px;
      border-radius: 6px;
      margin-bottom: 10px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-left: 4px solid #667eea;
    }

    .list-item audio {
      flex: 1;
      margin-right: 10px;
    }

    .nav {
      text-align: center;
      margin-top: 20px;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
    }

    .nav a {
      display: inline-block;
      padding: 10px 20px;
      background: #667eea;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.3s;
    }

    .nav a:hover {
      background: #764ba2;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎤 录音页面</h1>
    
    <div class="folder-info">
      <div style="margin-bottom: 15px;">
        <strong>当前文件夹：<span id="folderDisplay">加载中...</span></strong>
      </div>
      <div style="display: flex; gap: 10px; margin-bottom: 10px;">
        <input 
          type="date" 
          id="folderDate" 
          style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px;"
        />
        <button 
          id="changeFolderBtn" 
          style="padding: 8px 16px; background: #667eea; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;"
        >
          切换文件夹
        </button>
      </div>
      <p style="font-size: 12px; color: #999; margin: 0;">提示：扫二维码可直接打开指定日期的录音页面</p>
    </div>

    <div class="controls">
      <button id="start">▶ 开始录音</button>
      <button id="stop" disabled>■ 停止录音</button>
      <a href="folder.html" id="folderPageLink" style="flex: 1; min-width: 120px; padding: 12px 20px; font-size: 16px; font-weight: bold; text-decoration: none; background: #FF9800; color: white; text-align: center; border-radius: 8px; cursor: pointer;">📁 查看文件夹</a>
    </div>

    <div class="status" id="status"></div>

    <div class="list">
      <h2>本次会话录音</h2>
      <ul id="list" style="list-style: none;"></ul>
    </div>

    <div class="nav">
      <a href="index.html">← 返回看板</a>
    </div>
  </div>

  <script type="module">
    import { recordAudio } from "./js/recorder.js"
    import { saveAudio, getAllAudios } from "./js/db.js"
    import { createReviews, getTodayFolder } from "./js/scheduler.js"

    let recorder
    let currentFolder = getTodayFolder()

    // 从 URL 参数获取 folder
    const urlParams = new URLSearchParams(window.location.search)
    const paramFolder = urlParams.get('folder')
    if (paramFolder && /^\d{4}-\d{2}-\d{2}$/.test(paramFolder)) {
      currentFolder = paramFolder
    }

    // 初始化
    updateFolderDisplay()
    loadSessionAudios()

    function updateFolderDisplay() {
      document.getElementById("folderDisplay").textContent = currentFolder
      document.getElementById("folderDate").value = currentFolder
      document.getElementById("folderPageLink").href = `folder.html?date=${currentFolder}`
    }

    async function loadSessionAudios() {
      const allAudios = await getAllAudios()
      const sessionAudios = allAudios.filter(a => a.folder === currentFolder)
      
      const listEl = document.getElementById("list")
      listEl.innerHTML = ""
      
      sessionAudios.forEach(audio => {
        const listItem = document.createElement("li")
        listItem.className = "list-item"
        const url = URL.createObjectURL(audio.blob)
        listItem.innerHTML = `
          <audio controls src="${url}" style="flex: 1; margin-right: 10px;"></audio>
          <span style="font-size: 12px; color: #999;">ID: ${audio.id}</span>
        `
        listEl.appendChild(listItem)
      })
    }

    const startBtn = document.getElementById("start")
    const stopBtn = document.getElementById("stop")
    const statusDiv = document.getElementById("status")
    const changeFolderBtn = document.getElementById("changeFolderBtn")

    changeFolderBtn.onclick = () => {
      const newFolder = document.getElementById("folderDate").value
      if (newFolder && /^\d{4}-\d{2}-\d{2}$/.test(newFolder)) {
        currentFolder = newFolder
        updateFolderDisplay()
        loadSessionAudios()
        window.history.pushState({}, '', `?folder=${currentFolder}`)
      }
    }

    startBtn.onclick = async () => {
      try {
        statusDiv.textContent = "🔴 正在录音..."
        statusDiv.classList.add("recording")
        startBtn.disabled = true
        stopBtn.disabled = false

        recorder = await recordAudio(async (blob) => {
          const audio = {
            id: Date.now().toString(),
            blob,
            createdAt: Date.now(),
            folder: currentFolder,
            reviews: createReviews(Date.now())
          }

          await saveAudio(audio)

          statusDiv.textContent = "✅ 保存成功！"
          statusDiv.classList.remove("recording")
          startBtn.disabled = false
          stopBtn.disabled = true

          // 刷新列表
          await loadSessionAudios()

          setTimeout(() => {
            statusDiv.textContent = ""
          }, 3000)
        })
      } catch (error) {
        statusDiv.textContent = "❌ 错误：需要麦克风权限"
        console.error(error)
        startBtn.disabled = false
        stopBtn.disabled = true
      }
    }

    stopBtn.onclick = () => {
      if (recorder) {
        recorder.stop()
      }
    }
  </script>
</body>
</html>
