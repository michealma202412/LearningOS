<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📁 文件夹详情</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 20px;
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    }

    .header h1 {
      margin: 0 0 10px 0;
      color: #2c3e50;
    }

    .folder-date {
      font-size: 1.5em;
      font-weight: bold;
      color: #3498db;
      margin-bottom: 15px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 15px;
      margin: 20px 0;
    }

    .stat-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }

    .stat-number {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 14px;
      opacity: 0.9;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 20px;
      flex-wrap: wrap;
    }

    .btn-primary {
      padding: 12px 24px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }

    .btn-secondary {
      padding: 12px 24px;
      background: #95a5a6;
      color: white;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      transition: background 0.3s;
    }

    .btn-secondary:hover {
      background: #7f8c8d;
    }

    .btn-danger {
      padding: 8px 16px;
      background: #e74c3c;
      color: white;
      text-decoration: none;
      border-radius: 4px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .btn-danger:hover {
      background: #c0392b;
    }

    .content {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      padding: 25px;
      margin-bottom: 20px;
    }

    .section-title {
      color: #2c3e50;
      border-bottom: 2px solid #667eea;
      padding-bottom: 10px;
      margin-top: 30px;
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #999;
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 15px;
    }

    .audio-item, .article-item {
      background: #f9f9f9;
      border-left: 4px solid #667eea;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      flex-wrap: wrap;
    }

    .article-item {
      border-left-color: #4ECDC4;
      background: #f0f9ff;
    }

    .audio-item audio {
      flex: 1;
      min-width: 200px;
    }

    .audio-info, .article-info {
      flex: 1;
      min-width: 150px;
    }

    .audio-id, .article-title {
      font-size: 14px;
      font-weight: bold;
      color: #2c3e50;
      margin-bottom: 5px;
    }

    .audio-time, .article-meta {
      font-size: 12px;
      color: #999;
      margin-bottom: 5px;
    }

    .audio-actions, .article-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #e0e0e0;
      border-radius: 3px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #4CAF50, #45a049);
      border-radius: 3px;
    }

    .review-status {
      font-size: 12px;
      color: #666;
      margin-top: 8px;
    }

    .nav {
      text-align: center;
      margin-top: 30px;
      padding-top: 20px;
      border-top: 2px solid #f0f0f0;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #667eea;
    }

    .spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 3px solid #f3f3f3;
      border-top: 3px solid #667eea;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 10px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📁 文件夹详情</h1>
      <div class="folder-date" id="folderDate">加载中...</div>
      
      <div class="stats" id="stats"></div>

      <div class="actions">
        <a href="recorder.html" id="recordBtn" class="btn-primary">🎤 新增录音</a>
        <a href="editor.html" id="writeBtn" class="btn-primary">📝 写文章</a>
        <a href="index.html" class="btn-secondary">← 返回看板</a>
      </div>
    </div>

    <div class="content">
      <h2 class="section-title">🎵 音频文件</h2>
      <div id="audioList"></div>
      
      <h2 class="section-title">📝 文章</h2>
      <div id="articleList"></div>
    </div>
  </div>

  <script type="module">
    import { getAudiosByFolder, getAllAudios, updateAudio, deleteItem } from "./js/db.js"
    import { getFolderDateString, calculateFolderStats, isToday } from "./js/scheduler.js"

    let currentFolder = null

    // 从 URL 参数获取日期
    const urlParams = new URLSearchParams(window.location.search)
    const dateParam = urlParams.get('date')
    if (dateParam && /^\d{4}-\d{2}-\d{2}$/.test(dateParam)) {
      currentFolder = dateParam
    } else {
      // 默认显示今天
      const today = new Date()
      currentFolder = today.toISOString().split('T')[0]
    }

    async function init() {
      document.getElementById("folderDate").textContent = currentFolder
      
      // 设置按钮链接
      document.getElementById("recordBtn").href = `recorder.html?folder=${currentFolder}`
      document.getElementById("writeBtn").href = `editor.html?folder=${currentFolder}`

      // 显示加载状态
      const audioListDiv = document.getElementById("audioList")
      const articleListDiv = document.getElementById("articleList")
      
      audioListDiv.innerHTML = '<div class="loading"><span class="spinner"></span> 加载中...</div>'
      articleListDiv.innerHTML = '<div class="loading"><span class="spinner"></span> 加载中...</div>'

      try {
        console.log(`📂 开始加载文件夹: ${currentFolder}`)
        
        // 获取所有数据
        const allItems = await getAllAudios()
        console.log(`📊 从数据库获取到 ${allItems.length} 个项目`)
        
        // 过滤当前文件夹的内容
        const folderAudios = allItems.filter(a => a.folder === currentFolder && a.type === "audio")
        const folderArticles = allItems.filter(a => a.folder === currentFolder && a.type === "article")
        
        console.log(`✓ 文件夹 ${currentFolder}: ${folderAudios.length} 个音频, ${folderArticles.length} 篇文章`)
        
        // 更新统计信息
        try {
          const stats = calculateFolderStats([...folderAudios, ...folderArticles], currentFolder)
          console.log('📈 统计信息:', stats)
          updateStats(stats)
        } catch (statsError) {
          console.error('❌ 计算统计信息失败:', statsError)
          // 即使统计失败也继续显示内容
        }
        
        // 渲染音频列表
        renderAudioList(folderAudios)
        
        // 渲染文章列表
        renderArticleList(folderArticles)
        
        console.log('✅ 页面初始化完成')
        
        // 如果没有任何内容，显示友好提示
        if (folderAudios.length === 0 && folderArticles.length === 0) {
          console.log('💡 提示：该文件夹暂无内容，可以添加录音或文章')
        }
      } catch (error) {
        console.error("❌ 加载文件夹内容失败:", error)
        const errorMsg = `
          <div class="empty-state">
            <div class="empty-icon">❌</div>
            <p><strong>加载失败</strong></p>
            <p style="font-size: 14px; color: #999;">${error.message}</p>
            <p style="font-size: 12px; color: #ccc; margin-top: 15px;">
              💡 建议：<br>
              1. 打开浏览器控制台（F12）查看详细错误<br>
              2. 刷新页面重试<br>
              3. 检查 IndexedDB 是否正常
            </p>
          </div>
        `
        audioListDiv.innerHTML = errorMsg
        articleListDiv.innerHTML = errorMsg
      }
    }

    function updateStats(stats) {
      const statsContainer = document.getElementById("stats")
      statsContainer.innerHTML = `
        <div class="stat-card">
          <div class="stat-number">${stats.totalRecordings}</div>
          <div class="stat-label">总项目数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.totalAudios}</div>
          <div class="stat-label">音频数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.totalArticles}</div>
          <div class="stat-label">文章数</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.completedReviews}/${stats.totalReviews}</div>
          <div class="stat-label">已完成/总复习</div>
        </div>
        <div class="stat-card">
          <div class="stat-number">${stats.completionRate}%</div>
          <div class="stat-label">完成率</div>
        </div>
      `
    }

    function renderAudioList(folderAudios) {
      const listDiv = document.getElementById("audioList")
      
      if (folderAudios.length === 0) {
        listDiv.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">🎙️</div>
            <p>该文件夹中没有音频</p>
            <p style="font-size: 12px; color: #ccc; margin-top: 10px;">点击"新增录音"按钮添加内容</p>
          </div>
        `
        return
      }

      listDiv.innerHTML = ""

      folderAudios.forEach(audio => {
        // 确保音频有评论信息，如果没有则跳过或给予默认值
        if (!audio.reviews) {
          audio.reviews = []
        }
        
        const reviewStats = audio.reviews.reduce((acc, r) => {
          if (r.done) acc.completed++
          acc.total++
          return acc
        }, { completed: 0, total: 0 })

        const completionPercent = audio.reviews.length > 0 ? (reviewStats.completed / reviewStats.total) * 100 : 0

        const audioDiv = document.createElement("div")
        audioDiv.className = "audio-item"

        const url = URL.createObjectURL(audio.blob)
        const createdDate = new Date(audio.createdAt).toLocaleString('zh-CN')

        audioDiv.innerHTML = `
          <audio controls src="${url}" style="flex: 1; min-width: 200px;"></audio>
          <div class="audio-info">
            <div class="audio-id">ID: ${audio.id}</div>
            <div class="audio-time">创建: ${createdDate}</div>
            <div class="review-status">
              <strong>复习进度</strong>
              <div class="progress-bar">
                <div class="progress-fill" style="width: ${completionPercent}%"></div>
              </div>
              <div style="font-size: 11px; color: #999; margin-top: 5px;">
                ${reviewStats.completed} / ${reviewStats.total} 完成
              </div>
            </div>
          </div>
          <div class="audio-actions" id="actions_${audio.id}">
          </div>
        `

        listDiv.appendChild(audioDiv)

        // 添加操作按钮
        const actionsDiv = audioDiv.querySelector(`#actions_${audio.id}`)

        // 标记完成按钮（针对当天的未完成项）
        const pendingReview = audio.reviews.find(r => !r.done && isToday(r.date))
        if (pendingReview) {
          const completeBtn = document.createElement("button")
          completeBtn.className = "btn-primary"
          completeBtn.textContent = "✓ 完成"
          completeBtn.style.padding = "8px 12px"
          completeBtn.style.fontSize = "12px"
          completeBtn.onclick = async () => {
            audio.reviews.forEach(r => {
              if (!r.done && isToday(r.date)) r.done = true
            })
            await updateAudio(audio)
            init() // 刷新页面
          }
          actionsDiv.appendChild(completeBtn)
        }

        // 删除按钮
        const deleteBtn = document.createElement("button")
        deleteBtn.className = "btn-danger"
        deleteBtn.textContent = "🗑️ 删除"
        deleteBtn.onclick = async () => {
          if (confirm("确定要删除这条录音吗？此操作不可撤销。")) {
            await deleteItem(audio.id)
            init() // 刷新页面
          }
        }
        actionsDiv.appendChild(deleteBtn)
      })
    }

    function renderArticleList(folderArticles) {
      const listDiv = document.getElementById("articleList")
      
      if (folderArticles.length === 0) {
        listDiv.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📝</div>
            <p>该文件夹中没有文章</p>
            <p style="font-size: 12px; color: #ccc; margin-top: 10px;">点击"写文章"按钮添加内容</p>
          </div>
        `
        return
      }

      listDiv.innerHTML = ""

      folderArticles.forEach(article => {
        const articleDiv = document.createElement("div")
        articleDiv.className = "article-item"

        const createdDate = new Date(article.createdAt).toLocaleString('zh-CN')
        const contentPreview = article.content && article.content.length > 100 
          ? article.content.substring(0, 100) + "..." 
          : (article.content || '')

        articleDiv.innerHTML = `
          <div class="article-info" style="flex: 1; min-width: 200px;">
            <div class="article-title">${article.title || '无标题文章'}</div>
            <div class="article-meta">创建: ${createdDate}</div>
            <div style="margin-top: 10px; font-size: 14px; color: #555; line-height: 1.5;">
              ${contentPreview}
            </div>
          </div>
          <div class="article-actions" id="article_actions_${article.id}">
          </div>
        `

        listDiv.appendChild(articleDiv)

        // 添加操作按钮
        const actionsDiv = articleDiv.querySelector(`#article_actions_${article.id}`)

        // 查看全文按钮 - 链接到新文章页面
        const viewBtn = document.createElement("a")
        viewBtn.className = "btn-primary"
        viewBtn.textContent = "👁️ 查看"
        viewBtn.href = `article.html?id=${article.id}`
        viewBtn.style.padding = "8px 12px"
        viewBtn.style.fontSize = "12px"
        viewBtn.style.display = "inline-block"
        viewBtn.style.textAlign = "center"
        viewBtn.style.textDecoration = "none"
        viewBtn.style.minWidth = "60px"
        actionsDiv.appendChild(viewBtn)

        // 删除按钮
        const deleteBtn = document.createElement("button")
        deleteBtn.className = "btn-danger"
        deleteBtn.textContent = "🗑️ 删除"
        deleteBtn.onclick = async () => {
          if (confirm("确定要删除这篇文章吗？此操作不可撤销。")) {
            await deleteItem(article.id) // 使用正确的删除函数
            init() // Refresh the page
          }
        }
        actionsDiv.appendChild(deleteBtn)
      })
    }

    init()
  </script>
</body>
</html>
