<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LearningOS - 手机访问</title>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .container {
      background: white;
      border-radius: 20px;
      padding: 40px;
      max-width: 600px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    
    h1 {
      color: #667eea;
      margin-bottom: 10px;
      font-size: 32px;
    }
    
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 16px;
    }
    
    .qr-section {
      margin: 30px 0;
      padding: 20px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    
    #qrcode {
      margin: 20px auto;
      padding: 20px;
      background: white;
      border-radius: 12px;
      display: inline-block;
    }
    
    .url-display {
      background: #2c3e50;
      color: #ecf0f1;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
      font-family: monospace;
      font-size: 14px;
      word-break: break-all;
    }
    
    .instructions {
      text-align: left;
      margin: 30px 0;
      padding: 20px;
      background: #fff3cd;
      border-left: 4px solid #ffc107;
      border-radius: 8px;
    }
    
    .instructions h3 {
      color: #856404;
      margin-bottom: 15px;
    }
    
    .instructions ol {
      padding-left: 20px;
      line-height: 2;
      color: #856404;
    }
    
    .instructions li {
      margin: 10px 0;
    }
    
    .tips {
      margin-top: 20px;
      padding: 15px;
      background: #d1ecf1;
      border-radius: 8px;
      color: #0c5460;
      text-align: left;
    }
    
    .tips strong {
      display: block;
      margin-bottom: 10px;
    }
    
    button {
      background: #667eea;
      color: white;
      border: none;
      padding: 12px 24px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      margin: 10px;
      transition: all 0.3s;
    }
    
    button:hover {
      background: #764ba2;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 8px;
      font-size: 14px;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }
    
    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>📱 LearningOS 手机访问</h1>
    <p class="subtitle">扫描二维码或输入地址即可在手机上访问</p>
    
    <div class="qr-section">
      <h3 style="color: #2c3e50; margin-bottom: 15px;">📷 扫码访问（推荐）</h3>
      <div id="qrcode"></div>
      <div class="url-display" id="urlDisplay">
        http://192.168.0.104:5173/LearningOS/
      </div>
      <button onclick="copyURL()">📋 复制地址</button>
      <button onclick="regenerateQR()">🔄 刷新二维码</button>
    </div>
    
    <div class="instructions">
      <h3>📖 使用步骤</h3>
      <ol>
        <li><strong>确保手机和电脑在同一WiFi网络</strong></li>
        <li><strong>打开手机相机或微信</strong></li>
        <li><strong>扫描上方二维码</strong></li>
        <li><strong>点击链接访问应用</strong></li>
        <li><strong>添加到主屏幕（可选）</strong></li>
      </ol>
    </div>
    
    <div class="tips">
      <strong>💡 小贴士</strong>
      <ul style="padding-left: 20px; line-height: 1.8;">
        <li>iOS: Safari → 分享 → 添加到主屏幕</li>
        <li>Android: Chrome → 菜单 → 添加到主屏幕</li>
        <li>添加到主屏幕后可像APP一样使用</li>
        <li>数据保存在手机浏览器中</li>
      </ul>
    </div>
    
    <div id="statusMessage"></div>
  </div>

  <script>
    // Network URLs
    const urls = [
      'http://192.168.0.104:5173/LearningOS/',
      'http://10.0.85.2:5173/LearningOS/',
      'http://172.30.48.1:5173/LearningOS/'
    ];
    
    let currentUrlIndex = 0;
    
    // Generate QR Code
    function generateQR(url) {
      const qrcodeElement = document.getElementById('qrcode');
      qrcodeElement.innerHTML = '';
      
      QRCode.toCanvas(url, { 
        width: 250,
        margin: 2,
        color: {
          dark: '#667eea',
          light: '#ffffff'
        }
      }, function (error, canvas) {
        if (error) {
          console.error(error);
          showStatus('生成二维码失败', 'error');
        } else {
          qrcodeElement.appendChild(canvas);
        }
      });
    }
    
    // Copy URL to clipboard
    function copyURL() {
      const url = urls[currentUrlIndex];
      navigator.clipboard.writeText(url).then(() => {
        showStatus('✅ 地址已复制到剪贴板', 'success');
      }).catch(err => {
        // Fallback for older browsers
        const textArea = document.createElement('textarea');
        textArea.value = url;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        showStatus('✅ 地址已复制到剪贴板', 'success');
      });
    }
    
    // Regenerate QR with next URL
    function regenerateQR() {
      currentUrlIndex = (currentUrlIndex + 1) % urls.length;
      const url = urls[currentUrlIndex];
      document.getElementById('urlDisplay').textContent = url;
      generateQR(url);
      showStatus(`已切换到: ${url}`, 'info');
    }
    
    // Show status message
    function showStatus(message, type) {
      const statusEl = document.getElementById('statusMessage');
      statusEl.innerHTML = `<div class="status ${type}">${message}</div>`;
      setTimeout(() => {
        statusEl.innerHTML = '';
      }, 3000);
    }
    
    // Initialize
    window.onload = function() {
      generateQR(urls[0]);
    };
  </script>
</body>
</html>
